<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#DA291C" />
  <title>STRENCI PIERWSZY WE WSZYSTKO 🎁</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Górny pasek -->
  <header class="topbar">
    <div class="timer" id="timer">00:00</div>
    <div class="topbar-title" id="app-title">STRENCI PIERWSZY WE WSZYSTKO</div>
    <button id="reset-btn" class="reset-btn" title="Zrestartuj grę">↺ Reset</button>
  </header>

  <!-- EKRAN: START / BRAMA -->
  <section id="gate-screen" class="screen active gate-screen">
    <h1 class="gate-question" id="gate-question">Grasz czy Pass?</h1>
    <div class="gate-cards">
      <button class="gate-card gram" id="gate-gram">
        <div class="gate-photo" id="gate-gram-photo"></div>
        <span class="gate-card-label" id="gate-gram-label">GRAM</span>
      </button>
      <button class="gate-card pass" id="gate-pass">
        <div class="gate-photo" id="gate-pass-photo"></div>
        <span class="gate-card-label" id="gate-pass-label">PASS</span>
      </button>
    </div>
    <p class="gate-hint">Wybierz, klikając zdjęcie 👆</p>
  </section>

  <!-- EKRAN: MAPA -->
  <main id="map-screen" class="screen">
    <button id="world-back-btn" class="back-btn" style="display:none">← Mapa świata</button>
    <div class="worldmap-scroll" id="worldmap-scroll">
      <div class="worldmap-inner" id="worldmap-inner">
        <svg class="worldmap-land" id="worldmap-land" preserveAspectRatio="none" aria-hidden="true">
          <path id="land-path" />
        </svg>
        <svg class="worldmap-paths" id="worldmap-paths" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true"></svg>
        <div class="worldmap-nodes" id="worldmap-nodes"></div>
        <img id="map-avatar" class="map-avatar" src="assets/photos/glowa.webp" alt="" aria-hidden="true" />
      </div>
    </div>
    <div class="map-footer">Kliknij odblokowaną lokację 👆 zacznij od Meksyku 🇲🇽</div>
  </main>

  <!-- EKRAN: GRA -->
  <section id="game-screen" class="screen">
    <button id="back-btn" class="back-btn">← Mapa</button>
    <div id="game-content" class="game-content"></div>
  </section>

  <!-- EKRAN: FINAŁ -->
  <section id="final-screen" class="screen final-screen"></section>

  <!-- Pełnoekranowy odtwarzacz nagrań (zadania z wideo) -->
  <div id="video-overlay" class="video-overlay">
    <button id="video-close" class="video-close" aria-label="Zamknij">✕</button>
    <video id="video-player" class="video-player" controls playsinline></video>
  </div>

  <!-- GAME OVER: nagranie + wybuchający napis (po błędnej odpowiedzi) -->
  <div id="gameover" class="gameover">
    <div class="gameover-inner">
      <video id="gameover-video" class="gameover-video" playsinline preload="auto">
        <source src="assets/video/game-over.mp4" type="video/mp4" />
        <source src="assets/video/game-over.webm" type="video/webm" />
      </video>
      <img id="gameover-image" class="gameover-image" alt="" style="display:none" />
      <audio id="gameover-audio" preload="auto">
        <source src="assets/video/game-over-audio.m4a" type="audio/mp4" />
      </audio>
      <div class="gameover-text" id="gameover-text">GAME OVER</div>
      <button id="gameover-btn" class="btn btn-primary">Spróbuj jeszcze raz</button>
    </div>
  </div>

  <!-- MODAL: wygrana / przegrana -->
  <div id="modal" class="modal">
    <div class="modal-card">
      <div id="modal-photo" class="modal-photo"></div>
      <h2 id="modal-title" class="modal-title"></h2>
      <p id="modal-text" class="modal-text"></p>
      <button id="modal-btn" class="btn btn-primary"></button>
    </div>
  </div>

  <!-- Dźwięk wygranej (audio z win-wideo) -->
  <audio id="win-audio" preload="auto">
    <source src="assets/video/win-audio.m4a" type="audio/mp4" />
  </audio>

  <!-- Dźwięk popupu co minutę (5 s) -->
  <audio id="drink-audio" preload="auto">
    <source src="assets/audio/drink-sound.mp3" type="audio/mpeg" />
  </audio>

  <!-- Muzyka w tle (zapętlona, cicho, ścisza się przy innych dźwiękach) -->
  <audio id="bg-music" loop preload="auto">
    <source src="assets/audio/bg-music.mp3" type="audio/mpeg" />
  </audio>

  <!-- Konfetti / efekt -->
  <canvas id="fx" class="fx"></canvas>

  <script src="js/worldmap.js"></script>
  <script src="js/poland.js"></script>
  <script src="js/config.js"></script>
  <script src="js/games.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
